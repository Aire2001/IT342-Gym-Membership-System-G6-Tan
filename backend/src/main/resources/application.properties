# Server Configuration
server.port=8080

# MySQL Database (XAMPP)
spring.datasource.url=jdbc:mysql://localhost:3306/ironpass_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Logging
logging.level.edu.cit.tan.GymMembershipPaymentSystem=INFO
logging.level.org.springframework.security=WARN
